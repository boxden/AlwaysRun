name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Lua bytecode compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.1

      - name: Run smoke checks
        run: ./scripts/smoke.sh
